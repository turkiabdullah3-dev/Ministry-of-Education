services:
  - type: web
    name: ministry-of-education-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node backend/server.js
    plan: free
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: https://turki20.sa,https://www.turki20.sa
      - key: PUBLIC_API_ORIGIN
        value: https://api.turki20.sa
      - key: ANALYSIS_API_URL
        fromService:
          type: web
          name: ministry-of-education-analysis
          property: hostport

  - type: web
    name: ministry-of-education-analysis
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/analysis_api/requirements.txt
    startCommand: uvicorn analysis_api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://turki20.sa,https://www.turki20.sa
